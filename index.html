<style>
    .transaction-item {
        display: flex; justify-content: space-between; align-items: center;
        padding: 12px; background: white; border-radius: 10px;
        margin-bottom: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        border-left: 5px solid #ccc;
    }
    .transaction-item.in { border-left-color: var(--accent); }
    .transaction-item.out { border-left-color: var(--danger); }
    .delete-btn { background: #ffebee; color: var(--danger); border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
</style>

<!-- AGREGAR ESTA PANTALLA EN EL BODY -->
<div id="scr-history" class="screen">
    <div class="card">
        <h3 style="margin-bottom:15px; color:var(--primary);">Historial de Movimientos</h3>
        <div id="history-list">
            <!-- Aquí se cargarán los registros -->
        </div>
    </div>
</div>

<!-- ACTUALIZAR TU NAV (Añade el botón de Historial) -->
<nav class="bottom-nav">
    <button class="nav-item active" onclick="nav('scr-home', this)">🏠 INICIO</button>
    <button class="nav-item" onclick="nav('scr-add', this)">➕ REGISTRAR</button>
    <button class="nav-item" onclick="nav('scr-history', this)">📜 HISTORIAL</button>
    <button class="nav-item" onclick="nav('scr-rec', this)">📑 RECIBO</button>
</nav>

<script>
    // [Manten tu lógica anterior y añade/reemplaza estas funciones]

    function nav(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        
        if(id === 'scr-history') renderHistory();
        updateUI();
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        
        if(data.length === 0) {
            list.innerHTML = "<p style='text-align:center; color:#888;'>No hay registros aún.</p>";
            return;
        }

        // Mostrar del más reciente al más antiguo
        [...data].reverse().forEach((d, index) => {
            const realIndex = data.length - 1 - index;
            const div = document.createElement('div');
            div.className = `transaction-item ${d.type}`;
            div.innerHTML = `
                <div>
                    <div style="font-weight:bold; font-size:0.9rem;">${d.ter}</div>
                    <div style="font-size:0.75rem; color:#666;">${d.date} - ${d.desc}</div>
                </div>
                <div style="text-align:right;">
                    <div style="font-weight:bold; color:${d.type=='in'?'var(--accent)':'var(--danger)'}">
                        ${d.type=='in'?'+':'-'} $${d.amt.toLocaleString()}
                    </div>
                    <button class="delete-btn" onclick="deleteEntry(${realIndex})">Eliminar</button>
                </div>
            `;
            list.appendChild(div);
        });
    }

    function deleteEntry(index) {
        if(confirm("¿Estás seguro de eliminar este registro?")) {
            data.splice(index, 1);
            localStorage.setItem('freddy_fin_pro', JSON.stringify(data));
            renderHistory();
            updateUI();
        }
    }
</script>
